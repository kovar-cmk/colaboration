<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cybersecurity Portfolio</title>

  <!-- Tailwind (OK for dev, warning is normal) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts / Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- ===== HERO ===== -->
  <section id="hero" class="fade-up">
    <h1 id="mode-badge">RED TEAM</h1>
    <p id="hero-tagline"></p>
  </section>

  <!-- ===== SKILLS ===== -->
  <section id="skills" class="fade-up">
    <div id="skills-grid"></div>
  </section>

  <!-- ===== PROJECTS ===== -->
  <section id="projects" class="fade-up">
    <p id="tree-desc"></p>
    <div id="project-tree"></div>
    <div id="project-card"></div>
  </section>

  <!-- ===== ABOUT ===== -->
  <section id="about" class="fade-up">
    <h2>About</h2>
  </section>

  <!-- ===== TECH ===== -->
  <section id="tech" class="fade-up">
    <div id="tech-grid"></div>
  </section>

  <!-- ===== CONTACT ===== -->
  <section id="contact" class="fade-up">
    <form id="contact-form">
      <input id="name" placeholder="Name" required />
      <input id="email" placeholder="Email" required />
      <textarea id="message" placeholder="Message" required></textarea>
      <button type="submit">Send</button>
    </form>
    <div id="contact-status"></div>
  </section>

  <!-- ===== TERMINAL ===== -->
  <div id="terminal" class="minimized">
    <div id="term-body"></div>
    <input id="term-input" placeholder="type a command..." />
    <div id="term-chevron"></div>
  </div>

  <!-- ===== COMMAND PALETTE ===== -->
  <div id="cmd-palette">
    <input id="cmd-input" />
    <div id="cmd-list"></div>
  </div>

  <!-- ===== CANVAS ===== -->
  <canvas id="bg-canvas"></canvas>

  <!-- ===== CURSOR ===== -->
  <div id="cursor-glow"></div>

  <!-- ===== MODE FLASH ===== -->
  <div id="mode-flash"></div>

  <!-- ===== FOOTER ===== -->
  <footer>
    <span id="footer-mode">RED MODE ACTIVE</span>
  </footer>

  <!-- ===== LIBRARIES ===== -->

  <!-- vis-network (REQUIRED for your graph) -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <!-- ===== YOUR MAIN JS ===== -->
  <script src="main.js"></script>

</body>
</html>
